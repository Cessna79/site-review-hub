<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Site Reviews</title>

<style>

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}


body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f5f6f8;
  color: #1a1a1a;
  padding: 30px;
}


.wrap {
  max-width: 700px;
  margin: auto;
}


h1 {
  margin-bottom: 8px;
}


.sub {
  color: #666;
  margin-bottom: 20px;
}



/* Search */

#searchBox {

  width: 100%;
  padding: 14px 16px;
  margin-bottom: 25px;

  border: 1px solid #ddd;
  border-radius: 12px;

  font-size: 1rem;
  background: white;

}


#searchBox:focus {

  outline: none;
  border-color: #999;

}



/* Folder Sections */


.group {

  background: white;
  border: 1px solid #ddd;

  border-radius: 14px;
  margin-bottom: 25px;

  overflow: hidden;

}



summary {

  cursor: pointer;

  padding: 18px 20px;

  font-size: 1.2rem;

  font-weight: 600;

  background: #fafafa;

  list-style: none;

}



summary::-webkit-details-marker {

  display: none;

}



summary::after {

  content: "▶";

  float: right;

  transition: .2s;

}



details[open] summary::after {

  transform: rotate(90deg);

}



summary:hover {

  background: #eef1f4;

}





/* Project Cards */


.card {

  display: block;

  background: white;

  margin: 12px;

  padding: 18px 20px;

  border: 1px solid #e3e5e8;

  border-radius: 12px;

  text-decoration: none;

  color: inherit;

  transition: border-color .15s, transform .15s;

}



.card:hover {

  border-color: #999;

  transform: translateY(-1px);

}



.card b {

  display: block;

  margin-bottom: 5px;

}



.card span {

  color: #777;

  font-size: .9rem;

}





/* Status Badges */


.status {

  display: inline-block;

  margin-top: 10px;

  padding: 5px 12px;

  border-radius: 20px;

  font-size: .75rem;

  font-weight: 600;

}



.status.live {

  background: #dcfce7;

  color: #166534;

}



.status.review {

  background: #fef3c7;

  color: #92400e;

}



.status.draft {

  background: #fee2e2;

  color: #991b1b;

}





/* Empty Search Result */


.empty {

  padding: 18px;

  text-align: center;

  color: #777;

}


</style>

</head>


<body>


<div class="wrap">


<h1>Site Reviews</h1>


<p class="sub">
Projects ready for review — click any website to open.
</p>



<input
  type="text"
  id="searchBox"
  placeholder="Search projects..."
>




<!-- OWN PROJECTS -->


<details class="group">


<summary>
📁 Own Projects (<span id="ownCount">0</span>)
</summary>


<div id="ownProjects"></div>


</details>





<!-- CLIENT PROJECTS -->


<details class="group">


<summary>
👥 Client Projects (<span id="clientCount">0</span>)
</summary>


<div id="clientProjects"></div>


</details>




</div>



<script src="js/app.js"></script>


</body>
</html>
